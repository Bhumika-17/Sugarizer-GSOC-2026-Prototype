<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC '-//W3C//DTD SVG 1.1//EN' 'http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd' [
	<!ENTITY stroke_color "#010101">
	<!ENTITY fill_color "#FFFFFF">
]>
<!--
  activity-icon.svg  -  ConnectTheDot  55x55
  Four corner dots — three connected by bold solid lines,
  fourth connected by a dashed line hinting "connect to complete".
-->
<svg xmlns="http://www.w3.org/2000/svg" width="55" height="55" viewBox="0 0 55 55">

  <!-- Three solid connected sides -->
  <polyline points="11,11  44,11  44,44  11,44"
            fill="none" stroke="&stroke_color;" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dashed closing side — suggests final connection to make -->
  <line x1="11" y1="44" x2="11" y2="11"
        stroke="&stroke_color;" stroke-width="2.5"
        stroke-linecap="round" stroke-dasharray="5 5"/>

  <!-- Four corner dots -->
  <circle cx="11" cy="11" r="5.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="44" cy="11" r="5.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="44" cy="44" r="5.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>
  <circle cx="11" cy="44" r="5.5" fill="&fill_color;" stroke="&stroke_color;" stroke-width="1.5"/>

</svg>
