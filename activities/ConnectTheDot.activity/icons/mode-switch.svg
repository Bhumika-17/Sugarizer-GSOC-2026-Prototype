<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="55" height="55" viewBox="0 0 55 55">
  <!-- Row 1: Draw Mode — two dots + line -->
  <circle cx="7"  cy="11" r="3.5" fill="#ffffff"/>
  <line x1="11" y1="11" x2="33" y2="11" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="36" cy="11" r="3.5" fill="#ffffff"/>
  <!-- Row 2: Number Mode — three decreasing dots -->
  <circle cx="7"  cy="28" r="5"   fill="#ffffff"/>
  <line x1="12" y1="28" x2="33" y2="28" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="21" cy="28" r="3.5" fill="#ffffff"/>
  <circle cx="36" cy="28" r="2"   fill="#ffffff"/>
  <!-- Row 3: Game Mode — solid + outline squares -->
  <rect x="5"  y="38" width="13" height="13" fill="#ffffff"/>
  <rect x="21" y="38" width="13" height="13" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Right chevron -->
  <polyline points="44,16 50,27.5 44,39"
            fill="none" stroke="#ffffff" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
