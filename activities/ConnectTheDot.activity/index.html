<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ConnectTheDot Activity</title>
  <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, viewport-fit=cover" />
  <link rel="stylesheet" media="not screen and (device-width: 1200px) and (device-height: 900px)" href="lib/sugar-web/graphics/css/sugar-96dpi.css">
  <link rel="stylesheet" media="screen and (device-width: 1200px) and (device-height: 900px)" href="lib/sugar-web/graphics/css/sugar-200dpi.css">
  <link rel="stylesheet" href="css/activity.css">
  <link rel="stylesheet" href="css/introjs.css">
  <link rel="stylesheet" href="css/libnotify.css">
  <script src="lib/intro.js"></script>
  <script data-main="js/loader" src="lib/require.js"></script>
  <script type="text/javascript" src="../../cordova.js"></script>
</head>
<body>

  <div id="ctd-tooltip"></div>

  <div id="main-toolbar" class="toolbar">

    <button class="toolbutton" id="activity-button" data-tooltip="ConnectTheDot"></button>

    <!-- 3 mode buttons directly in toolbar — no popup -->
    <button class="toolbutton mode-btn" id="btn-draw"   data-tooltip="Draw Mode"></button>
    <button class="toolbutton mode-btn" id="btn-number" data-tooltip="Connect Mode"></button>
    <button class="toolbutton mode-btn" id="btn-game"   data-tooltip="Game Mode"></button>

    <!-- Undo / Redo — Draw mode only -->
    <button class="toolbutton draw-only" id="undo-button" data-tooltip="Undo (Ctrl+Z)" disabled></button>
    <button class="toolbutton draw-only" id="redo-button" data-tooltip="Redo (Ctrl+Y)" disabled></button>

    <!-- Shape picker — Connect mode only -->
    <button class="toolbutton number-only" id="shape-button" data-tooltip="Choose Shape"></button>

    <!-- Color picker -->
    <button class="toolbutton" id="color-button" data-tooltip="Choose Color"></button>

    <!-- Reset -->
    <button class="toolbutton" id="reset-button" data-tooltip="Reset Board"></button>

    <!-- Save image -->
    <button class="toolbutton" id="save-image-button" data-tooltip="Save Image"></button>

    <!-- Presence -->
    <button class="toolbutton" id="network-button" data-tooltip="Share Activity"></button>

    <!-- Right-aligned -->
    <button class="toolbutton pull-right" id="stop-button"  data-tooltip="Stop Activity"></button>
    <button class="toolbutton pull-right" id="help-button"  data-tooltip="Help"></button>

  </div>

  <div id="canvas">
    <canvas id="dots-canvas"></canvas>
  </div>

  <script>
    (function () {
      var tip = document.getElementById('ctd-tooltip');
      var hideTimer;
      function show(btn) {
        clearTimeout(hideTimer);
        var label = btn.getAttribute('data-tooltip');
        if (!label) return;
        var r = btn.getBoundingClientRect();
        tip.textContent = label;
        tip.classList.add('ctd-tooltip-visible');
        var tw = tip.offsetWidth;
        var left = r.left + r.width / 2 - tw / 2;
        left = Math.max(4, Math.min(left, window.innerWidth - tw - 4));
        tip.style.left = left + 'px';
        tip.style.top  = (r.bottom + 6) + 'px';
      }
      function hide() {
        hideTimer = setTimeout(function () { tip.classList.remove('ctd-tooltip-visible'); }, 80);
      }
      document.querySelectorAll('[data-tooltip]').forEach(function (btn) {
        btn.addEventListener('mouseenter', function () { show(btn); });
        btn.addEventListener('mouseleave', hide);
        btn.addEventListener('click', hide);
        btn.addEventListener('focus', function () { show(btn); });
        btn.addEventListener('blur', hide);
      });
    })();
  </script>

</body>
</html>
